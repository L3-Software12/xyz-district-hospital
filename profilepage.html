<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | XYZ Hospital</title>
<link rel="icon" type="image/png" href="logos.PNG">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f4f7fb;
    font-family:Arial, sans-serif;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#0d6efd,#0044aa);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    background:white;
    color:#0d6efd;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
}

/* PROFILE CARD */
.profile-card{
    background:white;
    max-width:700px;
    margin:40px auto;
    border-radius:20px;
    padding:40px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
}

.profile-icon{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    margin:auto;
    margin-bottom:20px;
}

.info-box{
    margin-top:30px;
    text-align:left;
}

.info-item{
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.label{
    font-weight:bold;
    color:#0d6efd;
}

/* BUTTONS */
.actions{
    margin-top:25px;
}

.btn-blue{
    border:none;
    background:#0d6efd;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    margin:5px;
}

.btn-red{
    border:none;
    background:red;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    margin:5px;
}

</style>
</head>

<body>

<script>

// PROTECT PAGE
let user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){
    window.location.href="login-page.html";
}

</script>

<header>

<h3>
<i class="fa-solid fa-user"></i>
 My Profile
</h3>

<a href="user-dashboard.html" class="back-btn">
← Back Dashboard
</a>

</header>

<div class="profile-card">

<div class="profile-icon">
<i class="fa-solid fa-user"></i>
</div>

<h2 id="username"></h2>

<p>XYZ Hospital Patient Account</p>

<div class="info-box">

<div class="info-item">
<span class="label">Username</span>
<span id="showUsername"></span>
</div>

<div class="info-item">
<span class="label">Email</span>
<span id="showEmail"></span>
</div>

<div class="info-item">
<span class="label">Account Status</span>
<span>Active</span>
</div>

</div>

<div class="actions">

<button class="btn-blue" onclick="editProfile()">
<i class="fa-solid fa-pen"></i>
 Edit Profile
</button>

<button class="btn-red" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
 Logout
</button>

</div>

</div>

<script>

// SHOW DATA
document.getElementById("username").innerText =
user.username;

document.getElementById("showUsername").innerText =
user.username;

document.getElementById("showEmail").innerText =
user.email;

// EDIT PROFILE
function editProfile(){

let newName = prompt("Enter new username", user.username);

if(newName){

user.username = newName;

localStorage.setItem("currentUser", JSON.stringify(user));

document.getElementById("username").innerText =
newName;

document.getElementById("showUsername").innerText =
newName;

alert("Profile updated successfully");

}

}

// LOGOUT
function logout(){

localStorage.removeItem("currentUser");

window.location.href="login-page.html";

}

</script>

</body>
</html>
