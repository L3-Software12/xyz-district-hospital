<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>
<link rel="icon" type="image/png" href="logos.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="stylefor-login-page.css">

<style>
.top-left-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background-color: #0dcaf0;
    color: white;
    z-index: 1000;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row h-100">

    <!-- LEFT -->
    <div class="col-md-6 left">

        <h1>
            GOOD HEALTH <span> IS WEALTH .</span>
        </h1>

        <div class="image-stack">
            <img src="inside.jpg" class="img1">
            <img src="ramusin.jpg" class="img2">
            <img src="stock.jpg" class="img3">
        </div>

    </div>

    <!-- RIGHT -->
    <div class="col-md-6 right">

        <div class="login-box">

            <h4 class="mb-4">Hospital Staff Login Only</h4>

            <input type="text" id="user" class="form-control mb-3" placeholder="Hospital Staff Username">

            <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-primary w-100 mb-3" onclick="login()">Log in</button>

            <p id="msg" class="text-center mt-3"></p>

        </div>

    </div>

</div>
</div>

<a href="index.html" class="btn btn-info px-4 py-2 top-left-btn">
    ← Back
</a>

<script>
function login(){
    let u = document.getElementById('user').value.trim();
    let p = document.getElementById('pass').value.trim();
    let msg = document.getElementById('msg');

    msg.innerText = "";

    // admin only check
    if(u === "" || p === ""){
        msg.style.color = "red";
        msg.innerText = "All fields are required!";
        return;
    }

    if(u === "admin" && p === "1234"){
        localStorage.setItem("role", "admin");
        window.location.href = "admin.html";
    } else {
        msg.style.color = "red";
        msg.innerText = "Access denied! Admin only.";
    }
}
</script>

</body>
</html>
