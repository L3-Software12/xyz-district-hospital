<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | XYZ Hospital</title>
<link rel="icon" type="image/png" href="logos.PNG">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f7fb;
    transition:0.3s;
}

/* DARK MODE */
body.dark{
    background:#0f172a;
    color:white;
}

body.dark .setting-card{
    background:#1e293b;
}

body.dark input{
    background:#0f172a;
    color:white;
    border:1px solid #334155;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#0d6efd,#0044aa);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.back-btn{
    background:white;
    color:#0d6efd;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* TITLE */
.title{
    text-align:center;
    margin-top:20px;
    color:#0d6efd;
}

/* CONTAINER */
.settings-container{
    max-width:900px;
    margin:20px auto;
    padding:10px;
}

/* CARD */
.setting-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    margin-bottom:15px;
}

/* TITLE CARD */
.card-title{
    display:flex;
    align-items:center;
    gap:10px;
    color:#0d6efd;
    margin-bottom:10px;
}

.icon-box{
    width:40px;
    height:40px;
    background:#e7f0ff;
    color:#0d6efd;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:5px;
}

/* SWITCH */
.switch{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 0;
}

/* BUTTON */
.save-btn{
    width:100%;
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
}

/* 📱 MOBILE */
@media(max-width:768px){

header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
}

.title{
    font-size:20px;
}

}

</style>

</head>

<body>

<script>

let user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){
    window.location.href="login-page.html";
}

</script>

<header>
<h5><i class="fa fa-gear"></i> Settings</h5>
<a href="user-dashboard.html" class="back-btn">← Dashboard</a>
</header>

<h3 class="title">Account Settings</h3>

<div class="settings-container">

<!-- ACCOUNT -->
<div class="setting-card">
<div class="card-title">
<div class="icon-box"><i class="fa fa-user"></i></div>
<h6>Account Info</h6>
</div>

<label>Username</label>
<input type="text" id="username" readonly>

<label class="mt-2">Email</label>
<input type="text" id="email" readonly>
</div>

<!-- SECURITY -->
<div class="setting-card">
<div class="card-title">
<div class="icon-box"><i class="fa fa-lock"></i></div>
<h6>Security</h6>
</div>

<label>New Password</label>
<input type="password" id="password" placeholder="Enter new password">
</div>

<!-- NOTIFICATIONS -->
<div class="setting-card">
<div class="card-title">
<div class="icon-box"><i class="fa fa-bell"></i></div>
<h6>Notifications</h6>
</div>

<div class="switch">
<span>Email Notifications</span>
<input type="checkbox" id="emailNotif">
</div>

<div class="switch">
<span>SMS Notifications</span>
<input type="checkbox" id="smsNotif">
</div>
</div>

<!-- THEME -->
<div class="setting-card">
<div class="card-title">
<div class="icon-box"><i class="fa fa-moon"></i></div>
<h6>Appearance</h6>
</div>

<div class="switch">
<span>Dark Mode</span>
<input type="checkbox" id="darkMode" onchange="toggleDark()">
</div>
</div>

<button class="save-btn" onclick="saveSettings()">Save Changes</button>

</div>

<script>

// LOAD USER
document.getElementById("username").value = user.username;
document.getElementById("email").value = user.email;

// LOAD SETTINGS
let saved = JSON.parse(localStorage.getItem("settings_"+user.username));

if(saved){
    document.getElementById("emailNotif").checked = saved.emailNotif;
    document.getElementById("smsNotif").checked = saved.smsNotif;
    document.getElementById("darkMode").checked = saved.darkMode;

    if(saved.darkMode){
        document.body.classList.add("dark");
    }
}

// DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");
}

// SAVE
function saveSettings(){

let newPassword = document.getElementById("password").value;

// update password if not empty
if(newPassword !== ""){
    user.password = newPassword;
    localStorage.setItem("currentUser", JSON.stringify(user));
}

// save settings
let settings = {
emailNotif: document.getElementById("emailNotif").checked,
smsNotif: document.getElementById("smsNotif").checked,
darkMode: document.getElementById("darkMode").checked
};

localStorage.setItem("settings_"+user.username, JSON.stringify(settings));

alert("Settings saved successfully!");

}

</script>

</body>
</html>
