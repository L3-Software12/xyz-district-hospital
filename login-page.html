<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Login</title>
<link rel="icon" type="image/png" href="logos.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- external csss -->
<link rel="stylesheet" href="stylefor-login-page.css">
<style>
    /* button back*/
    .top-left-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background-color: #0dcaf0; /* Bootstrap light blue */
    color: white;
    z-index: 1000;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row h-100">

    <!-- LEFT -->
    <div class="col-md-6 left">

        <h1>
            GOOD HEALTH <span> IS WEALTH .</span>
        </h1>

        <div class="image-stack">
            <img src="inside.jpg" class="img1">
            <img src="ramusin.jpg" class="img2">
            <img src="stock.jpg" class="img3">
        </div>

    </div>

    <!-- RIGHT -->
    <div class="col-md-6 right">

        <div class="login-box">

            <h4 class="mb-4">Log into Hospital</h4>

            <input type="text" id="user" class="form-control mb-3" placeholder="Email or mobile number">

            <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-main w-100 mb-3" onclick="login()">Log in</button>

            <!-- 🔥 EXTERNAL LINK -->
            <div class="text-center mb-3">
                <a href="forget.html">Forgot password?</a>
            </div>

            <hr>

            <!-- 🔥 EXTERNAL PAGE BUTTON -->
            <button onclick="window.location.href='register.html'" 
            class="btn create-btn w-100">
                Create new account
            </button>

            <p id="msg" class="text-center mt-3"></p>

        </div>

    </div>

</div>
</div>
<a href="index.html" class="btn btn-info px-4 py-2 top-left-btn">
    ← Back
</a><script>
function login(){
    let u = document.getElementById('user').value.trim();
    let p = document.getElementById('pass').value.trim();
    let msg = document.getElementById('msg');

    msg.innerText = ""; // clear message

    // ✅ 1. EMPTY VALIDATION
    if(u === "" || p === ""){
        msg.style.color = "red";
        msg.innerText = "All fields are required!";
        return;
    }

    // ✅ 2. EMAIL FORMAT CHECK (only if user typed email)
    if(u.includes("@")){
        let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if(!emailPattern.test(u)){
            msg.style.color = "red";
            msg.innerText = "Invalid email format!";
            return;
        }
    }

    // ✅ 3. PASSWORD LENGTH
    if(p.length < 4){
        msg.style.color = "red";
        msg.innerText = "Password must be at least 4 characters!";
        return;
    }

    // ✅ 4. CHECK LOCAL STORAGE USERS
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let found = users.find(user => 
        (user.username === u || user.email === u) && user.password === p
    );

    if(found){
        localStorage.setItem("currentUser", JSON.stringify(found));
        window.location.href="user-dashboard.html";
    }else{
        msg.style.color = "red";
        msg.innerText = "Invalid username/email or password!";
    }
}
</script>
</body>
</html>
