<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Call</title>
<link rel="icon" type="image/png" href="logos.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* BODY */
body{
    background:#f0f8ff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: url(ramusin.jpg);
}

/* CARD */
.call-screen{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ICON */
.profile{
    width:70px;
    height:70px;
    border-radius:50%;
    background:#0d6efd;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:white;
    margin:auto;
}

/* TEXT */
.calling{
    margin-top:10px;
    font-size:16px;
    color:#555;
}

/* BUTTONS */
.btn-call{
    background:#0d6efd;
    color:white;
    padding:10px 20px;
    border-radius:30px;
    border:none;
    margin-top:15px;
    width:100%;
}

.btn-call:hover{
    background:#0b5ed7;
}

.btn-end{
    background:#adb5bd;
    color:white;
    padding:10px 20px;
    border-radius:30px;
    border:none;
    margin-top:10px;
    width:100%;
}

.btn-end:hover{
    background:#6c757d;
}

/* BACK BUTTON */
.back-btn{
    display:inline-block;
    margin-top:15px;
    background:#e7f1ff;
    color:#0d6efd;
    padding:8px 15px;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="call-screen">

    <div class="profile">📞</div>

    <h5 class="mt-3 text-primary">Emergency Call</h5>

    <p class="calling" id="status">Click to start call</p>

    <!-- START CALL -->
    <button class="btn-call" onclick="startCall()">
        Start Call
    </button>

    <!-- END CALL -->
    <button class="btn-end" onclick="endCall()">
        End Call
    </button>

    <a href="user-dashboard.html" class="back-btn">← Back</a>

</div>

<!-- AUDIO -->
<audio id="ringtone" loop>
    <source src="airport_tone.mp3" type="audio/mpeg">
</audio>

<script>

function startCall(){
    let audio = document.getElementById("ringtone");

    audio.play().then(()=>{
        document.getElementById("status").innerText = "Calling...";
    }).catch(()=>{
        alert("Please click first to allow sound");
    });
}

function endCall(){
    let audio = document.getElementById("ringtone");
    audio.pause();
    audio.currentTime = 0;

    document.getElementById("status").innerText = "Call Ended";
}

</script>

</body>
</html>
