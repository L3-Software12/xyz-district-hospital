<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="icon" type="image/png" href="logos.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-image: url("ramusin.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.25);
}

.box{
    width:400px;
    border-radius:15px;
    position:relative;
    background:white;
    z-index:1;
}

h4{
    color:#0d6efd;
    font-weight:bold;
}

.btn-main{
    background:#0d6efd;
    color:white;
}
</style>
</head>

<body>

<div class="card box shadow-lg">
<div class="card-body">

<h4 class="text-center mb-3">Reset Password</h4>

<input type="email" id="email" class="form-control mb-3" placeholder="Enter your email">

<button onclick="resetPassword()" class="btn btn-main w-100 mb-2">
Send Reset Link
</button>

<a href="login-page.html" class="btn btn-outline-primary w-100">
Back to Login
</a>

</div>
</div>

<script>
function resetPassword(){
    let email = document.getElementById("email").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email);

    if(user){
        alert("Your password is: " + user.password);
    }else{
        alert("Email not found!");
    }
}
</script>

</body>
</html>
